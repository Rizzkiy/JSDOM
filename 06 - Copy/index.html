<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple DOM Manipulation - Minimalist</title>
    <style>
        body {
            font-family: "Inter", -apple-system, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        #app {
            width: 100%;
            max-width: 400px;
            border: 1px solid #000;
            padding: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-bottom: 30px;
        }

        li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .completed {
            text-decoration: line-through;
            color: #a0a0a0;
        }

        .highlight {
            background-color: #000;
            color: #fff;
            padding-left: 10px;
            font-weight: normal;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            background: #000;
            color: #fff;
            border: 1px solid #000;
            padding: 10px 15px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            flex: 1;
        }

        button:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="app">
        <h1 id="main-title">Judul Awal</h1>
        <p id="description">Ini adalah deskripsi yang akan diubah.</p>
        
        <ul id="todo-list">
            <li>Belajar JavaScript Dasar</li>
        </ul>

        <div class="button-group">
            <button onclick="updateDisplay()">Update Tampilan</button>
            <button onclick="addTask()">Tambah Tugas</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
