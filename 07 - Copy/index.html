<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Todo List - Minimal</title>
    <style>
        body {
            font-family: "Inter", sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
            border: 1px solid #000;
            padding: 30px;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 25px;
            border-bottom: 4px solid #000;
            display: inline-block;
        }

        #todoForm {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .row-judul {
            display: flex;
            gap: 10px;
        }

        .form-control {
            flex: 1;
            padding: 12px;
            border: 1px solid #000;
            border-radius: 0;
            outline: none;
            font-size: 14px;
        }

        .form-control:focus {
            background-color: #f9f9f9;
        }

        button {
            background: #000;
            color: #fff;
            border: 1px solid #000;
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            transition: 0.2s;
        }

        button:hover {
            background: #fff;
            color: #000;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        input[type="checkbox"] {
            accent-color: #000;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Todo List</h1>
        
        <form id="todoForm">
            <section id="input">
                <div class="row-judul">
                    <input type="text" class="form-control" id="todoInput" placeholder="Masukkan Tugas Baru">
                    <button type="submit" id="submitBtn">Submit</button>
                </div>
            </section>

            <div class="form-check">
                <input type="checkbox" id="checkbox">
                <label for="checkbox">Tandai semua selesai</label>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
