<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan DOM Selection</title>
    <style>
        body { 
            font-family: "Inter", sans-serif; 
            background: #ffffff; 
            color: #1a1a1a; 
            margin: 0; 
            padding: 40px 20px; 
        }
        
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: #ffffff; 
            padding: 30px; 
            border: 1px solid #e0e0e0;
            border-radius: 0;
        }

        .judul { 
            color: #000; 
            font-size: 24px; 
            font-weight: 700; 
            text-align: left; 
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        section { 
            margin-bottom: 25px; 
            padding-bottom: 10px; 
        }

        .row-judul { 
            display: flex; 
            gap: 10px; 
        }

        .form-control { 
            flex: 1; 
            padding: 10px; 
            border: 1px solid #000; 
            border-radius: 0; 
            outline: none;
            font-size: 14px;
        }

        button { 
            background: #000; 
            color: #fff; 
            border: 1px solid #000; 
            padding: 10px 20px; 
            border-radius: 0; 
            cursor: pointer; 
            font-size: 14px;
            transition: 0.2s;
        }

        button:hover { 
            background: #fff; 
            color: #000; 
        }

        h3 { 
            font-size: 16px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-bottom: 2px solid #000;
            display: inline-block;
            margin-bottom: 15px;
        }

        .todo-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #fff; 
            margin: 10px 0; 
            padding: 12px 0; 
            border-bottom: 1px solid #eee; 
        }

        .todo-text { font-size: 15px; flex-grow: 1; }
        
        .todo-done { 
            text-decoration: line-through; 
            color: #a0a0a0; 
        }

        .delete-btn { 
            background: transparent; 
            color: #000; 
            border: none;
            padding: 4px 8px; 
            font-size: 12px; 
            text-decoration: underline;
        }

        .delete-btn:hover { 
            background: #000; 
            color: #fff; 
            text-decoration: none;
        }
        
        .done-btn-style {
            background: transparent;
            color: #000;
            border: 1px solid #000;
            margin-right: 8px;
            padding: 4px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <section id="judul">
            <p class="judul">Todo List App</p>
        </section>
        
        <section id="input">
            <div class="row-judul">
                <input type="text" id="todoInput" class="form-control" placeholder="Tulis tugas baru...">
                <button id="btn-submit">Tambah</button>
            </div>
        </section>

        <section id="list">
            <h3>Daftar Tugas</h3>
            <div id="todoListContainer">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
